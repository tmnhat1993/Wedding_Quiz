<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Đám Cưới 💒</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <!-- ── QUIZ IN PROGRESS ─────────────────────────── -->
            <div id="quizInProgress">
                <div class="wedding-card">

                    <!-- Header -->
                    <div class="quiz-header">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span id="playerNameDisplay" style="font-size:0.9rem;opacity:0.85;">
                                Người chơi
                            </span>
                            <span id="questionCounter" style="font-size:0.85rem;opacity:0.75;">
                                Câu 1 / 10
                            </span>
                            <span class="score-badge">
                                ⭐ <span id="scoreDisplay">0</span>
                            </span>
                        </div>
                        <!-- Progress bar -->
                        <div class="progress">
                            <div id="progressBar" class="progress-bar" style="width:0%"></div>
                        </div>
                    </div>

                    <!-- Body -->
                    <div class="card-body p-3 p-md-4">

                        <!-- Timer -->
                        <div class="timer-wrap">
                            <span id="timerNumber" class="timer-number">30</span>
                            <div class="timer-bar-track">
                                <div id="timerBar" class="timer-bar-fill" style="width:100%"></div>
                            </div>
                        </div>

                        <!-- Question -->
                        <p id="questionText" class="question-text">Đang tải câu hỏi…</p>

                        <!-- Options -->
                        <div id="optionsContainer"></div>

                    </div>
                </div>
            </div>

            <!-- ── RESULT SCREEN (hidden until quiz ends) ──── -->
            <div id="resultScreen" style="display:none;">
                <div class="wedding-card">
                    <div class="card-body p-4 text-center">

                        <div id="resultGradeEmoji" style="font-size:3.5rem;line-height:1;margin-bottom:0.5rem;">🏆</div>
                        <div id="resultGrade" class="result-grade mb-1">Thiên tài tình yêu!</div>
                        <p class="text-muted mb-2" style="font-size:0.85rem;">
                            Xin chúc mừng, <strong id="resultName"></strong>!
                        </p>

                        <div class="result-score-big mb-1" id="resultScore">0</div>
                        <div class="text-muted mb-3" style="font-size:0.85rem;">điểm / 20,000</div>

                        <!-- Stats -->
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <div class="result-stat">
                                    <div class="result-stat-num">
                                        <span id="resultCorrect">0</span>/10
                                    </div>
                                    <div class="result-stat-lbl">Câu đúng</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="result-stat">
                                    <div class="result-stat-num" id="resultTime">0s</div>
                                    <div class="result-stat-lbl">Tổng thời gian</div>
                                </div>
                            </div>
                        </div>

                        <!-- My rank badge -->
                        <div id="myRankBox" class="my-rank-box mb-3" style="display:none;">
                            🎯 Bạn đang xếp hạng&nbsp;<span id="myRankNum" class="my-rank-num">#?</span>
                        </div>

                        <!-- Inline leaderboard -->
                        <div class="result-lb-title">🏆 Bảng Xếp Hạng</div>
                        <div id="resultLbList" class="result-lb-list mb-4">
                            <div class="text-center py-3 text-muted" style="font-size:0.85rem;">
                                <div class="spinner-border spinner-border-sm me-1"></div> Đang tải…
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2">
                            <a href="index.html" class="btn btn-outline-wedding flex-fill text-center">
                                🏠 Trang chủ
                            </a>
                            <button class="btn btn-wedding flex-fill" onclick="playAgain()">
                                🔄 Chơi lại
                            </button>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Feedback toast -->
<div id="feedbackToast" class="feedback-toast"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/questions.js"></script>
<script src="js/quiz.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Set player name in result screen
    const pName = sessionStorage.getItem('playerName');
    if (pName) document.getElementById('resultName').textContent = pName;

    window.addEventListener('load', initQuiz);
</script>
</body>
</html>
