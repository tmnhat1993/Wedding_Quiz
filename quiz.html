<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Đám Cưới 💒</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <!-- ── QUIZ IN PROGRESS ─────────────────────────── -->
            <div id="quizInProgress">
                <div class="wedding-card">

                    <!-- Header -->
                    <div class="quiz-header">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span id="playerNameDisplay" style="font-size:0.9rem;opacity:0.85;">
                                Người chơi
                            </span>
                            <span id="questionCounter" style="font-size:0.85rem;opacity:0.75;">
                                Câu 1 / 10
                            </span>
                            <span class="score-badge" style="font-weight:600;font-size:0.82rem;">
                                💒 Quiz
                            </span>
                        </div>
                        <!-- Progress bar -->
                        <div class="progress">
                            <div id="progressBar" class="progress-bar" style="width:0%"></div>
                        </div>
                        <p class="text-center mb-0 mt-2" style="font-size:0.72rem;opacity:0.8;">10 · 05 · 2026</p>
                    </div>

                    <!-- Body -->
                    <div class="card-body p-3 p-md-4">

                        <!-- Timer -->
                        <div class="timer-wrap">
                            <span id="timerNumber" class="timer-number">30</span>
                            <div class="timer-bar-track">
                                <div id="timerBar" class="timer-bar-fill" style="width:100%"></div>
                            </div>
                        </div>

                        <!-- Question -->
                        <p id="questionText" class="question-text">Đang tải câu hỏi…</p>

                        <!-- Options -->
                        <div id="optionsContainer"></div>

                        <button type="button" id="nextQuestionBtn" class="btn btn-wedding w-100 mt-3" disabled>
                            <i class="bi bi-arrow-right-circle me-2"></i>Câu tiếp theo
                        </button>

                    </div>
                </div>
            </div>

            <!-- ── RESULT SCREEN (hidden until quiz ends) ──── -->
            <div id="resultScreen" style="display:none;">
                <div class="wedding-card">
                    <div class="card-body p-4 text-center">

                        <div style="font-size:3.25rem;line-height:1;margin-bottom:0.75rem;">💒</div>
                        <h2 class="result-grade mb-3" style="font-size:1.65rem;">Cảm ơn bạn đã tham gia!</h2>
                        <p class="mb-2" style="font-size:1rem;color:var(--dark);">
                            Xin chào <strong id="resultName"></strong>,
                        </p>
                        <p class="text-muted mb-4" style="font-size:0.95rem;line-height:1.55;">
                            Cảm ơn bạn đã tham gia cùng chương trình. Xin mời bạn cùng chờ đợi kết quả từ chương trình nhé!
                        </p>
                        <p class="text-muted mb-0" style="font-size:0.85rem;letter-spacing:0.12em;">10 · 05 · 2026</p>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Feedback toast -->
<div id="feedbackToast" class="feedback-toast"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/quiz-session.js"></script>
<script src="js/questions.js"></script>
<script src="js/quiz.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Set player name in result screen
    const pName = sessionStorage.getItem('playerName');
    if (pName) document.getElementById('resultName').textContent = pName;

    window.addEventListener('load', initQuiz);
</script>
</body>
</html>
