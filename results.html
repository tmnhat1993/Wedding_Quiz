<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Câu Hỏi 📊</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4 results-screen">
    <div class="row justify-content-center">
        <div class="col-12">
            <div class="wedding-card">
                    <div id="resultHeaderBar" class="quiz-header results-header-bar" style="display:none;">
                    <div class="position-relative text-center mb-2">
                        <span id="resultHeaderTitle" class="results-header-title" style="display:none;">Kết Quả</span>
                        <span id="resultQuestionCounter" class="results-question-counter" style="position:absolute;right:0;top:50%;transform:translateY(-50%);">Câu 1 / 10</span>
                    </div>
                    <div class="progress">
                        <div id="resultProgressBar" class="progress-bar" style="width:0%"></div>
                    </div>
                </div>

                <div class="card-body p-3 p-md-4">
                    <div id="resultIntro" class="text-center py-3">
                        <div class="mb-3">
                            <h2 class="wedding-title mb-0">Mỹ Dung</h2>
                            <span class="heart-divider">♥</span>
                            <h2 class="wedding-title mb-0">Minh Kiệt</h2>
                            <p class="wedding-date mt-2 mb-0">10 · 05 · 2026</p>
                        </div>
                        <p class="mb-2 results-intro-text" style="color:var(--dark);font-weight:600;line-height:1.45;">
                            Chào mừng quý khách đến với phần hỏi đáp vui
                        </p>
                        <p class="text-muted mb-3 results-intro-subtext" style="line-height:1.55;">
                            Trong tiệc hôm nay, để vào trò chơi quý khách vui lòng quét mã QR<br>
                            hoặc mở đúng đường dẫn như trên màn hình sự kiện, rồi nhập tên của mình.<br>
                            chúc quý khách chơi vui và may mắn!
                        </p>
                        <div class="text-center mb-3">
                            <img
                                src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https%3A%2F%2Ftmnhat1993.github.io%2FWedding_Quiz%2F"
                                alt="QR vào mini game"
                                style="width:150px;height:150px;border-radius:12px;border:1px solid #f0dde2;padding:6px;background:#fff;"
                            >
                        </div>
                        <button id="startCheckAnswersBtn" class="btn btn-wedding px-4 results-main-btn">
                            <i class="bi bi-search-heart me-1"></i>Kiểm tra đáp án
                        </button>
                    </div>

                    <div id="resultFlow" style="display:none;">
                        <p id="resultQuestionText" class="question-text mb-3 results-question-text">Đang tải câu hỏi…</p>
                        <div id="resultRowsContainer"></div>

                        <div class="result-actions-row mt-3">
                            <button id="showAnswerBtn" class="btn btn-outline-success">
                                <i class="bi bi-check-circle me-1"></i>Đáp án
                            </button>
                            <button id="nextResultBtn" class="btn btn-wedding">
                                <i class="bi bi-arrow-right-circle me-1"></i>Tiếp theo
                            </button>
                            <button id="goLeaderboardBtn" class="btn btn-warning" style="display:none;">
                                <i class="bi bi-trophy me-1"></i>BẢNG XẾP HẠNG
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/questions.js"></script>
<script src="js/results.js"></script>
<script>
    window.addEventListener('load', initResultsPage);
</script>
</body>
</html>
