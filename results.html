<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Câu Hỏi 📊</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12">
            <div class="wedding-card">
                <div class="quiz-header">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span style="font-size:0.85rem;opacity:0;pointer-events:none;">Câu 10 / 10</span>
                        <span style="font-size:18px;font-weight:800;text-align:center;display:block;opacity:0.95;">Kết Quả</span>
                        <span id="resultQuestionCounter" style="font-size:0.85rem;opacity:0.75;">Câu 1 / 10</span>
                    </div>
                    <div class="progress">
                        <div id="resultProgressBar" class="progress-bar" style="width:0%"></div>
                    </div>
                </div>

                <div class="card-body p-3 p-md-4">
                    <p id="resultQuestionText" class="question-text mb-3">Đang tải câu hỏi…</p>
                    <div id="resultRowsContainer"></div>

                    <div class="result-actions-row mt-3">
                        <button id="showVotesBtn" class="btn btn-outline-secondary">
                            <i class="bi bi-bar-chart-line me-1"></i>Kết quả bình chọn
                        </button>
                        <button id="showAnswerBtn" class="btn btn-outline-success">
                            <i class="bi bi-check-circle me-1"></i>Đáp án
                        </button>
                        <button id="nextResultBtn" class="btn btn-wedding">
                            <i class="bi bi-arrow-right-circle me-1"></i>Tiếp theo
                        </button>
                        <button id="goLeaderboardBtn" class="btn btn-warning" style="display:none;">
                            <i class="bi bi-trophy me-1"></i>BẢNG XẾP HẠNG
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/questions.js"></script>
<script src="js/results.js"></script>
<script>
    window.addEventListener('load', initResultsPage);
</script>
</body>
</html>
