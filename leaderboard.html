<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng 🏆</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <div class="wedding-card">

                <!-- Header -->
                <div class="lb-header">
                    <div style="font-size:2rem;margin-bottom:0.25rem;">🏆</div>
                    <h2>Bảng Xếp Hạng</h2>
                    <p style="font-size:0.85rem;opacity:0.8;margin:0.25rem 0 0;">
                        💍 Bùi Thị Mỹ Dung &amp; Giang Minh Kiệt · 10.05.2026
                    </p>
                </div>

                <div id="lbRevealPanel" class="px-3 py-4 text-center">
                    <button type="button" id="lbRevealBtn" class="btn btn-wedding lb-reveal-btn w-100">
                        <i class="bi bi-trophy-fill me-2"></i>
                        Công bố top 10
                    </button>
                    <p class="text-muted small mt-2 mb-0">Nhấn để mở bảng xếp hạng (chỉ hiện 10 người dẫn đầu)</p>
                </div>

                <div id="lbTableSection" class="d-none">
                    <div class="px-3 py-2 text-center"
                         style="background:#FFF5F7;border-bottom:1px solid #FFE4EC;">
                        <span id="totalPlayers" class="lb-total-players">—</span>
                    </div>

                    <div class="d-flex align-items-center px-3 pt-3 pb-1"
                         style="font-size:0.72rem;color:#bbb;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">
                        <div style="width:36px;min-width:36px;text-align:center;">#</div>
                        <div class="flex-grow-1 ms-3">Tên</div>
                        <div style="min-width:70px;text-align:right;">Điểm</div>
                        <div style="min-width:52px;text-align:right;">Thời gian</div>
                    </div>

                    <div class="px-3 pb-3" id="listEl">
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<!-- Floating petals -->
<div class="petals-container" id="petalsContainer"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/leaderboard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    window.addEventListener('load', initLeaderboard);

    // Floating petals
    (function() {
        const container = document.getElementById('petalsContainer');
        const emojis = ['🌸', '🌺', '🌼', '✨', '💮'];
        for (let i = 0; i < 14; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left              = Math.random() * 100 + 'vw';
            p.style.fontSize          = (Math.random() * 12 + 9) + 'px';
            p.style.animationDuration = (Math.random() * 6 + 9) + 's';
            p.style.animationDelay    = (Math.random() * 12) + 's';
            container.appendChild(p);
        }
    })();
</script>
</body>
</html>
