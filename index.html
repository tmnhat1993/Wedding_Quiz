<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Đám Cưới 💒</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <!-- Couple header -->
            <div class="text-center mb-4">
                <span class="rings-icon">💍</span>
                <h1 class="wedding-title">Mỹ Dung</h1>
                <span class="heart-divider">♥</span>
                <h1 class="wedding-title">Minh Kiệt</h1>
                <p class="wedding-date mt-2">10 · 05 · 2026</p>
            </div>

            <!-- Welcome card -->
            <div class="wedding-card mb-4">
                <div class="card-body p-4">
                    <h4 class="text-center mb-1" style="color:var(--gold);font-family:'Playfair Display',serif;">
                        🎊 Hỏi đáp vui
                    </h4>
                    <p class="text-center text-muted mb-4" style="font-size:0.9rem;">
                        Bạn hiểu cô dâu chú rể đến đâu?  Tham gia ngay để nhận những phần quà đáng yêu từ cặp đôi nhé — kết quả sẽ được công bố trong chương trình!
                    </p>

                    <!-- Stats -->
                    <div class="row g-2 mb-4">
                        <div class="col-4">
                            <div class="stat-box">
                                <div class="stat-number">10</div>
                                <div class="stat-label">Câu hỏi</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="stat-box">
                                <div class="stat-number">10s</div>
                                <div class="stat-label">Mỗi câu</div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="stat-box">
                                <div class="stat-number">✨</div>
                                <div class="stat-label">Chờ kết quả</div>
                            </div>
                        </div>
                    </div>

                    <!-- Name input -->
                    <label for="playerName" class="form-label fw-semibold" style="font-size:0.9rem;">
                        Tên của bạn là:
                    </label>
                    <input
                        type="text"
                        id="playerName"
                        class="form-control wedding-input text-center mb-3"
                        placeholder="Tên của bạn..."
                        maxlength="30"
                        autocomplete="off"
                    >

                    <p id="sessionCheckMsg" class="text-center text-muted mb-2" style="font-size:0.82rem;">
                        Đang kiểm tra trạng thái game…
                    </p>
                    <p id="alreadyPlayedMsg" class="alert alert-warning py-2 px-3 mb-3 text-center" style="display:none;font-size:0.88rem;"></p>

                    <button type="button" id="startQuizBtn" class="btn btn-wedding w-100" disabled onclick="startQuiz()">
                        <i class="bi bi-play-fill me-2"></i>Bắt đầu!
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Floating petals -->
<div class="petals-container" id="petalsContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/quiz-session.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('playerName').addEventListener('keydown', e => {
        if (e.key === 'Enter' && typeof window.startQuiz === 'function') window.startQuiz();
        document.getElementById('playerName').classList.remove('is-invalid');
    });

    window.addEventListener('load', () => {
        const sessionMsg = document.getElementById('sessionCheckMsg');
        const startBtn   = document.getElementById('startQuizBtn');
        const playedMsg  = document.getElementById('alreadyPlayedMsg');
        const nameInput  = document.getElementById('playerName');
        let latestStatus = QUIZ_STATUS_PENDING;

        const applyUiBySession = ({ epoch, gameStatus }) => {
            latestStatus = gameStatus;
            sessionStorage.setItem('quizRoundEpoch', String(epoch));
            sessionStorage.setItem('quizGameStatus', gameStatus);

            startBtn.disabled = true;
            nameInput.disabled = false;
            playedMsg.style.display = 'none';
            sessionMsg.style.display = 'block';

            if (weddingQuizHasPlayedCurrentRound(epoch)) {
                window.location.href = 'quiz.html';
                return;
            }

            if (gameStatus === QUIZ_STATUS_STARTED) {
                sessionMsg.style.display = 'none';
                startBtn.disabled = false;
                return;
            }

            if (gameStatus === QUIZ_STATUS_ENDED) {
                window.location.href = 'quiz.html';
                return;
            }

            sessionMsg.textContent = 'Game chưa bắt đầu. Bạn hãy chờ ban tổ chức một xíu nhé!';
        };

        fetchQuizSessionMeta()
            .then(applyUiBySession)
            .catch(() => {
                sessionMsg.textContent = 'Không kiểm tra được trạng thái game. Thử tải lại trang hoặc kiểm tra kết nối.';
            });

        onQuizSessionMetaChange(applyUiBySession);

        window.startQuiz = function startQuizWithStateCheck() {
            if (latestStatus !== QUIZ_STATUS_STARTED) {
                sessionMsg.style.display = 'block';
                sessionMsg.textContent = latestStatus === QUIZ_STATUS_ENDED
                    ? 'Game đã kết thúc, không thể tham gia mới.'
                    : 'Game chưa bắt đầu. Bạn hãy chờ ban tổ chức một xíu nhé!';
                return;
            }

            const epochStr = sessionStorage.getItem('quizRoundEpoch');
            const epoch = epochStr !== null && epochStr !== '' ? Number(epochStr) : NaN;
            if (!Number.isNaN(epoch) && weddingQuizHasPlayedCurrentRound(epoch)) {
                return;
            }

            const inp = document.getElementById('playerName');
            const name = inp.value.trim();
            if (!name) {
                inp.classList.add('is-invalid');
                inp.placeholder = 'Vui lòng nhập tên nhé!';
                inp.focus();
                return;
            }
            inp.classList.remove('is-invalid');
            sessionStorage.setItem('playerName', name);
            window.location.href = 'quiz.html';
        };
    });

    // Floating petals
    (function createPetals() {
        const container = document.getElementById('petalsContainer');
        const emojis = ['🌸', '🌺', '🌼', '🌹', '✨', '💮'];
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.left              = Math.random() * 100 + 'vw';
            p.style.fontSize          = (Math.random() * 14 + 9) + 'px';
            p.style.animationDuration = (Math.random() * 6 + 9) + 's';
            p.style.animationDelay    = (Math.random() * 12) + 's';
            container.appendChild(p);
        }
    })();
</script>
</body>
</html>
